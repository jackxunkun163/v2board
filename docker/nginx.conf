server {
    listen      80 default_server;
    server_name _;
    root        /var/www/v2board/public;
    index       index.php index.html;

    client_max_body_size 32m;
    client_body_timeout  60s;

    # SPA's checkQueue() polls /monitor/api/stats for queue status. This path
    # doesn't exist in v2board — left unhandled it returns 403, which the SPA's
    # response interceptor treats as "session expired" and clears the auth token.
    # Return a stub so the SPA gets a non-403 response and stays logged in.
    location /monitor/api/stats {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # Laravel front-controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    # Stash compiled assets longer
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location ~ /\.(ht|git|env) {
        deny all;
    }
}
